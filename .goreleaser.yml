release:
  name_template: "{{ .Version }} - {{ .Date }}"
  draft: true
  header: |
    ## 下载
    | 平台 | 架构 | 文件 |
    |------|------|------|
    | macOS | amd64 | `geektime-downloader_{{ .Version }}_darwin_amd64.tar.gz` |
    | macOS | arm64 | `geektime-downloader_{{ .Version }}_darwin_arm64.tar.gz` |
    | Linux | amd64 | `geektime-downloader_{{ .Version }}_linux_amd64.tar.gz` |
    | Linux | arm64 | `geektime-downloader_{{ .Version }}_linux_arm64.tar.gz` |
    | Windows | amd64 | `geektime-downloader_{{ .Version }}_windows_amd64.zip` |
    | Windows | 32位 | `geektime-downloader_{{ .Version }}_windows_386.zip` |
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - 386
      - amd64
      - arm
      - arm64
    ignore:
      - goos: windows
        goarch: arm 
    flags:
      - -trimpath  
    ldflags:
      - -s -w -X main.version={{ .Version }}     
archives:
  -
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README*
      - LICENSE*
      - "*.1"
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}"
changelog:
  sort: desc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
